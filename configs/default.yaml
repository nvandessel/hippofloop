base_model: "unsloth/Qwen2.5-3B-Instruct-bnb-4bit"

lora:
  rank: 32
  alpha: 64
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

training:
  learning_rate: 2.0e-4
  lr_scheduler: cosine
  warmup_ratio: 0.03
  epochs: 3
  batch_size: 4
  gradient_accumulation_steps: 4
  max_seq_length: 4096
  weight_decay: 0.01
  bf16: true

data:
  train_split: 0.8
  val_split: 0.1
  test_split: 0.1
  seed: 42

export:
  quantization: Q4_K_M
  output_path: "~/.floop/models/hippofloop.gguf"
